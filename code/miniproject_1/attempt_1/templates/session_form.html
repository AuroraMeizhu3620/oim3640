{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h2>Record Class Session</h2>
  <form method="post">
    <div class="form-grid">
      <label>Session Date<input type="date" name="session_date" value="{{ today }}"></label>
      <label class="full-span">Notes<textarea name="notes" rows="3" placeholder="Optional class notes"></textarea></label>
    </div>

    {% if students %}
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Attendance</th>
              <th>Participation Count</th>
            </tr>
          </thead>
          <tbody>
            {% for student in students %}
              <tr>
                <td>{{ student.last }}, {{ student.first }}</td>
                <td>
                  <select name="attendance_{{ student.id }}">
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Late">Late</option>
                  </select>
                </td>
                <td><input type="number" name="participation_{{ student.id }}" min="0" value="0"></td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <button type="submit">Save Session</button>
    {% else %}
      <p>Add students before recording a session.</p>
    {% endif %}
  </form>
</section>
{% endblock %}
