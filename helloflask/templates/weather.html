<!DOCTYPE html>
<html>
<head>
    <title>Weather Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f8ff;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #45a049;
        }
        .weather-info {
            margin-top: 20px;
            padding: 20px;
            background-color: #e3f2fd;
            border-radius: 4px;
            text-align: center;
        }
        .temp {
            font-size: 36px;
            font-weight: bold;
            color: #1976d2;
        }
        .city-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .description {
            font-size: 16px;
            color: #666;
            text-transform: capitalize;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Lookup</h1>
        
        <form method="GET" action="/weather_search">
            <div class="form-group">
                <input type="text" name="city" placeholder="Enter city name..." required />
                <button type="submit">Search</button>
            </div>
        </form>
        
        {% if weather %}
            <div class="weather-info">
                <div class="city-name">{{ weather.city }}</div>
                <div class="temp">{{ weather.temp }}°F</div>
                <div class="description">{{ weather.description }}</div>
            </div>
        {% elif error %}
            <div class="error">
                <strong>Error:</strong> {{ error }}
            </div>
        {% else %}
            <p style="text-align: center; color: #999;">Enter a city name to get started!</p>
        {% endif %}
    </div>
</body>
</html>
